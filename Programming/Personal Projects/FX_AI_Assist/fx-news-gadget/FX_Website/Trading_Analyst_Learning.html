<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Multi-Asset Trading Analyst</title>
    <!-- Load Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for aesthetic enhancements */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        .container-card {
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-radius: 1rem;
        }
        .btn-primary {
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(45, 125, 230, 0.3);
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3b82f6; /* Blue for the spinner */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div id="app" class="w-full max-w-4xl container-card p-6 md:p-10">
        <h1 class="text-3xl font-extrabold text-gray-800 mb-6 text-center">
            Multi-Asset Trading Analyst
        </h1>

        <!-- User Authentication Status (Important for Firestore access) -->
        <p id="auth-status" class="text-xs text-center mb-4 text-gray-500">Initializing...</p>

        <!-- Input Form -->
        <div class="space-y-4 mb-8">
            <div>
                <label for="asset-input" class="block text-sm font-medium text-gray-700 mb-1">Asset (e.g., EUR/USD, TSLA, BTC/USD)</label>
                <input type="text" id="asset-input" value="EUR/USD" placeholder="Enter asset symbol"
                       class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
            </div>
            <div>
                <label for="query-input" class="block text-sm font-medium text-gray-700 mb-1">Analysis Query</label>
                <textarea id="query-input" rows="3" placeholder="Analyze the current trend and potential risks for the next 24 hours."
                          class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">Analyze the potential impact of the upcoming ECB meeting on EUR/USD and provide a concise forecast.</textarea>
            </div>
            <button id="analyze-btn" onclick="analyzeMarket()"
                    class="btn-primary w-full flex justify-center items-center py-3 px-4 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50"
                    aria-label="Analyze Market">
                <span id="button-text">Get Market Analysis</span>
                <div id="loading-spinner" class="spinner ml-2 hidden"></div>
            </button>
        </div>

        <!-- Analysis Output -->
        <div id="analysis-output" class="hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Analysis Report</h2>
            <div id="analysis-text" class="text-gray-700 leading-relaxed mb-4 p-4 bg-blue-50 rounded-lg border border-blue-200">
                <!-- LLM generated text will be inserted here -->
            </div>

            <!-- Grounding Sources -->
            <div id="sources-container" class="mt-6">
                <h3 class="text-md font-semibold text-gray-600 mb-2">Grounding Sources (Real-time Data):</h3>
                <ul id="sources-list" class="list-disc pl-5 space-y-1 text-sm text-gray-500">
                    <!-- Sources will be listed here -->
                </ul>
            </div>
        </div>

        <!-- Error/Message Display -->
        <div id="message-area" class="mt-4 p-3 hidden bg-red-100 border border-red-400 text-red-700 rounded-lg" role="alert">
            <!-- Error messages will be inserted here -->
        </div>

    </div>

    <!-- Firebase SDK Imports (Using Type="module" is necessary for modern JS structure) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- GLOBAL VARIABLES (Mandatory Canvas Environment Variables) ---
        // These variables are provided by the hosting environment for Firebase setup and security.
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app;
        let db;
        let auth;
        let userId = null; // Stores the current user ID for data path construction.

        // Global constant for the Gemini model used for text generation and analysis.
        const GEMINI_MODEL = "gemini-2.5-flash-preview-05-20";
        const API_BASE_URL = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

        // --- UTILITY FUNCTION: EXPONENTIAL BACKOFF (CRITICAL FOR API CALLS) ---
        /**
         * @comment
         * This function implements Exponential Backoff, a crucial technique for resilient API calls.
         * If the API call fails (often due to temporary issues like network latency or rate limiting),
         * the function retries the call with an increasing delay (e.g., 1s, 2s, 4s, 8s).
         * This prevents overwhelming the server and gives temporary issues time to resolve.
         * @param {Function} apiCall - The function that attempts the API request.
         * @param {number} maxRetries - Maximum number of times to retry.
         * @returns {Promise<Response>} The successful Fetch Response object.
         */
        async function makeApiCallWithBackoff(apiCall, maxRetries = 5) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await apiCall();
                    if (response.status === 429 || response.status >= 500) {
                        // 429 (Too Many Requests) or 5xx (Server Error) suggests a retry is useful.
                        throw new Error(`API Error: ${response.status}`);
                    }
                    if (!response.ok) {
                         // Throw for other non-retryable errors like 400 Bad Request
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`API Request Failed: ${response.status} - ${errorData.error?.message || response.statusText}`);
                    }
                    return response; // Success!
                } catch (error) {
                    console.error(`Attempt ${i + 1} failed:`, error.message);
                    if (i === maxRetries - 1) {
                        // If it's the last attempt, rethrow the error to be handled by the main function.
                        throw new Error(`API call failed after ${maxRetries} attempts.`);
                    }
                    // Calculate delay: 2^i seconds (1, 2, 4, 8, 16 seconds) + a small random jitter.
                    const delay = Math.pow(2, i) * 1000 + Math.random() * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        // --- FIREBASE INITIALIZATION AND AUTHENTICATION ---
        /**
         * @comment
         * The `initFirebaseAndAuth` function sets up the required Firebase services (App, Auth, Firestore).
         * It is crucial for initializing the global Firebase instances and establishing the user's session.
         * * Authentication using `__initial_auth_token` ensures the user is securely identified in the Canvas
         * environment, which is necessary to satisfy Firestore Security Rules for accessing data.
         */
        async function initFirebaseAndAuth() {
            if (Object.keys(firebaseConfig).length === 0) {
                document.getElementById('auth-status').textContent = "Firebase config not available. App will run in non-persistent mode.";
                return;
            }

            try {
                // 1. Initialize the Firebase app instance.
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                // IMPORTANT: Set Firestore log level to Debug to see details in console.
                setLogLevel('Debug');
                
                // 2. Authenticate the user. Use the provided custom token if available, otherwise sign in anonymously.
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }

                // 3. Set up the Auth State Change Listener (Crucial for getting the final userId).
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid; // The authenticated user ID.
                        document.getElementById('auth-status').textContent = `Authenticated User ID: ${userId.substring(0, 10)}...`;
                    } else {
                        // Should fall back to an anonymous user in this environment, but good practice to handle.
                        userId = crypto.randomUUID(); // Fallback for unauthenticated users (for private data path).
                        document.getElementById('auth-status').textContent = `Running anonymously (ID: ${userId.substring(0, 10)}...)`;
                    }
                });
            } catch (error) {
                console.error("Firebase initialization or authentication failed:", error);
                document.getElementById('auth-status').textContent = "Authentication Error.";
                showMessage(`Initialization failed: ${error.message}`, 'error');
            }
        }

        /**
         * @comment
         * Utility to display temporary error or success messages to the user.
         */
        function showMessage(message, type = 'error') {
            const messageArea = document.getElementById('message-area');
            messageArea.textContent = message;
            messageArea.className = `mt-4 p-3 rounded-lg block`;
            if (type === 'error') {
                messageArea.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
            } else if (type === 'success') {
                messageArea.classList.add('bg-green-100', 'border', 'border-green-400', 'text-green-700');
            }
            messageArea.classList.remove('hidden');
            setTimeout(() => {
                messageArea.classList.add('hidden');
            }, 5000);
        }

        // Attach the main function to the window object so the button can call it.
        window.analyzeMarket = async function() {
            const asset = document.getElementById('asset-input').value.trim();
            const query = document.getElementById('query-input').value.trim();
            
            if (!asset || !query) {
                showMessage("Please enter both an Asset and an Analysis Query.", 'error');
                return;
            }

            // UI State Management (Disable button and show spinner)
            const btn = document.getElementById('analyze-btn');
            const btnText = document.getElementById('button-text');
            const spinner = document.getElementById('loading-spinner');
            
            btn.disabled = true;
            btnText.textContent = 'Analyzing...';
            spinner.classList.remove('hidden');
            document.getElementById('analysis-output').classList.add('hidden');
            document.getElementById('message-area').classList.add('hidden');

            try {
                // 1. Construct the complete user prompt for the model.
                const fullQuery = `Asset: ${asset}. Task: ${query}. Please provide a detailed, professional market analysis focusing on technical and fundamental factors.`;

                // 2. Define the System Instruction (Persona). This guides the model's tone and role.
                /**
                 * @comment
                 * The System Instruction is critical. It sets the LLM's 'persona' (world-class financial analyst)
                 * and dictates the desired output format (concise, professional, actionable).
                 * This dramatically improves the quality and relevance of the analysis.
                 */
                const systemPrompt = "You are a world-class multi-asset financial and technical analyst. Provide a professional, concise, and actionable analysis based on the latest available market data. Your analysis MUST include a directional forecast (e.g., 'Bullish bias above X', 'Bearish continuation below Y') and reference at least two specific data points or technical indicators.";

                // 3. Construct the API Payload.
                /**
                 * @comment
                 * The payload includes the user content, the system instruction, and the 'tools'.
                 * The 'tools' property, specifically `Google Search: {}`, enables **Grounding**.
                 * Grounding forces the model to check Google Search for real-time, up-to-date information
                 * (essential for market analysis) and provides source citations.
                 */
                const payload = {
                    contents: [{ parts: [{ text: fullQuery }] }],
                    tools: [{ "google_search": {} }], // Enable real-time Google Search
                    systemInstruction: {
                        parts: [{ text: systemPrompt }]
                    },
                    // We request a higher temperature (0.7) for more creative/deep analysis, but keep it grounded.
                    generationConfig: {
                        temperature: 0.7 
                    }
                };

                const apiKey = ""; // API Key is retrieved from the Canvas environment runtime.

                // 4. Execute the API Call with Exponential Backoff.
                const response = await makeApiCallWithBackoff(() => 
                    fetch(`${API_BASE_URL}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                );
                
                // 5. Process the Response.
                const result = await response.json();
                const candidate = result.candidates?.[0];

                if (!candidate || !candidate.content?.parts?.[0]?.text) {
                    throw new Error("Analysis failed: Model returned no text content.");
                }

                // Extract the generated text.
                const analysisText = candidate.content.parts[0].text;
                document.getElementById('analysis-text').innerHTML = formatAnalysis(analysisText);

                // Extract grounding sources (citations).
                let sources = [];
                const groundingMetadata = candidate.groundingMetadata;
                /**
                 * @comment
                 * This section parses the `groundingMetadata` to find the URIs and Titles of the web pages
                 * the model used to inform its answer. Displaying these sources is mandatory for a
                 * grounded application, ensuring transparency and verifiability.
                 */
                if (groundingMetadata && groundingMetadata.groundingAttributions) {
                    sources = groundingMetadata.groundingAttributions
                        .map(attribution => ({
                            uri: attribution.web?.uri,
                            title: attribution.web?.title,
                        }))
                        .filter(source => source.uri && source.title);
                }

                // Update the Sources UI.
                const sourcesList = document.getElementById('sources-list');
                sourcesList.innerHTML = ''; // Clear previous sources.
                if (sources.length > 0) {
                    sources.forEach(source => {
                        const li = document.createElement('li');
                        // Use target="_blank" to open links in a new tab.
                        li.innerHTML = `<a href="${source.uri}" target="_blank" class="text-blue-600 hover:underline">${source.title}</a>`;
                        sourcesList.appendChild(li);
                    });
                } else {
                    sourcesList.innerHTML = '<li>No specific grounding sources found for this analysis.</li>';
                }

                // Show the output section.
                document.getElementById('analysis-output').classList.remove('hidden');

            } catch (error) {
                console.error("Market Analysis Error:", error);
                // Display the error message to the user.
                showMessage(`Analysis failed: ${error.message}`, 'error');
                document.getElementById('analysis-output').classList.add('hidden');
            } finally {
                // Restore UI state regardless of success or failure.
                btn.disabled = false;
                btnText.textContent = 'Get Market Analysis';
                spinner.classList.add('hidden');
            }
        }
        
        /**
         * @comment
         * A simple utility function to format the plain text response from the LLM into basic HTML.
         * This improves readability by converting newlines to <br> tags and basic markdown elements.
         */
        function formatAnalysis(text) {
            // Replace newlines with paragraph breaks.
            let formatted = text.replace(/\n\s*\n/g, '</p><p>');
            formatted = formatted.replace(/\n/g, '<br>'); // Convert remaining single newlines to <br>
            // Wrap in an initial paragraph tag.
            if (!formatted.startsWith('<p>')) {
                formatted = '<p>' + formatted + '</p>';
            }
            return formatted;
        }

        // Execute initialization when the script loads.
        window.onload = initFirebaseAndAuth;

    </script>
</body>
</html>
