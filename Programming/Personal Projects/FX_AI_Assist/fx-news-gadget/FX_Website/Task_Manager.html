<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Task Manager</title>
    <!-- 
        1. CSS Styling Section:
        This section defines the visual presentation (colors, layout, fonts) of the application.
        The CSS here is designed to be modern, responsive, and easy on the eyes.
        We are using custom CSS here for educational purposes.
    -->
    <style>
        /* CSS Variables: Define reusable values for consistency and easy updates. */
        :root {
            --primary-color: #3b82f6; /* A nice blue */
            --secondary-color: #60a5fa;
            --background-color: #f3f4f6;
            --card-background: #ffffff;
            --text-color: #1f2937;
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Basic Reset: Ensures consistent rendering across different browsers. */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align content to the top */
            min-height: 100vh;
            box-sizing: border-box; /* Include padding and border in the element's total width and height */
        }

        /* Main Container: Limits the app width on large screens and centers it. */
        .container {
            width: 100%;
            max-width: 700px; /* Max width for a clean look on desktop */
            padding: 20px;
        }

        /* Header Styling */
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        /* Input Form (New Task Area) */
        .task-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-light);
            background-color: var(--card-background);
            padding: 15px;
            border-radius: 12px;
        }

        #task-input {
            flex-grow: 1; /* Allows the input field to take up available space */
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        #task-input:focus {
            border-color: var(--secondary-color);
            outline: none; /* Remove default focus outline */
        }

        #add-task-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.1s;
        }

        #add-task-btn:hover {
            background-color: #2563eb;
        }
        
        #add-task-btn:active {
            transform: scale(0.98); /* Subtle click effect */
        }

        /* Task List Container */
        #task-list {
            list-style: none; /* Remove bullet points */
            padding: 0;
            margin-top: 0;
        }

        /* Individual Task Item Styling */
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-background);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            box-shadow: var(--shadow-light);
            transition: transform 0.2s, opacity 0.2s;
            cursor: pointer;
        }

        /* Styling for completed tasks */
        .task-item.completed {
            background-color: #d1fae5; /* Light green background */
            opacity: 0.7;
        }

        .task-item.completed .task-text {
            text-decoration: line-through; /* Strikethrough for completed task text */
            color: #4b5563;
        }

        .task-text {
            flex-grow: 1;
            padding-right: 15px;
            word-break: break-word; /* Prevents overflow for long task names */
        }

        /* Delete Button Styling */
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444; /* Red color for delete */
            cursor: pointer;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .delete-btn:hover {
            background-color: #fee2e2;
        }

        /* Message for empty list */
        #empty-message {
            text-align: center;
            color: #6b7280;
            font-style: italic;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #d1d5db;
        }

        /* Responsive Design: Adjust layout for smaller screens */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .task-input-container {
                flex-direction: column; /* Stack input and button on small screens */
            }
            #task-input, #add-task-btn {
                width: 100%;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 
        2. HTML Structure Section:
        This section defines the content and structure of the page (the layout).
        It contains the main container, the heading, the input form, and the list container.
    -->
    <div class="container">
        <h1>IT Student's Task Manager</h1>

        <!-- Input container for adding new tasks -->
        <div class="task-input-container">
            <input type="text" id="task-input" placeholder="Enter a new learning goal or task...">
            <button id="add-task-btn">Add Task</button>
        </div>

        <!-- Message displayed when the list is empty -->
        <p id="empty-message" style="display: none;">Your task list is empty. Start adding new goals!</p>

        <!-- The unordered list where tasks will be dynamically inserted by JavaScript -->
        <ul id="task-list">
            <!-- Task items will go here -->
        </ul>
    </div>

    <!-- 
        3. JavaScript Logic Section:
        This section handles the interactivity, logic, and data management.
        It contains detailed comments for educational purposes.
    -->
    <script>
        // --- 3.1 Caching DOM Elements (Performance Tip) ---

        // WHY: Accessing the Document Object Model (DOM) is an expensive operation 
        // because the browser has to locate the element every time.
        // WHAT FOR: We cache references to the elements we use often in variables 
        // so JavaScript can access them quickly without searching the DOM repeatedly.
        const taskInput = document.getElementById('task-input');
        const addTaskBtn = document.getElementById('add-task-btn');
        const taskList = document.getElementById('task-list');
        const emptyMessage = document.getElementById('empty-message');
        
        // A unique key for storing data in localStorage to avoid conflicts
        const STORAGE_KEY = 'learningTasks'; 

        // --- 3.2 Main Data Structure ---

        // WHY: It's best practice to manage the application's state (data) in a simple 
        // JavaScript array rather than reading/writing directly to the DOM for every change.
        // WHAT FOR: This array will hold task objects, each having an id, text, and completion status. 
        // Changes are made to this array first, then the DOM is updated to reflect the array.
        let tasks = [];

        // --- 3.3 Utility Functions ---

        /**
         * @function saveTasks
         * WHY: To ensure data persistence so tasks are saved even when the user closes the browser.
         * WHAT FOR: Converts the 'tasks' array to a JSON string and stores it in the browser's localStorage.
         */
        const saveTasks = () => {
            // localStorage only stores strings, so we use JSON.stringify() to convert the array.
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        };

        /**
         * @function loadTasks
         * WHY: To retrieve saved tasks when the application first loads.
         * WHAT FOR: Reads the data from localStorage, parses the JSON string back into an array, 
         * and initializes the 'tasks' array.
         */
        const loadTasks = () => {
            const savedTasks = localStorage.getItem(STORAGE_KEY);
            // Check if there is data. If so, parse it. If not, default to an empty array.
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
            }
        };

        /**
         * @function toggleEmptyMessage
         * WHY: To dynamically show or hide the "list is empty" message.
         * WHAT FOR: Checks the length of the 'tasks' array and sets the 'display' style accordingly.
         */
        const toggleEmptyMessage = () => {
            if (tasks.length === 0) {
                emptyMessage.style.display = 'block';
            } else {
                emptyMessage.style.display = 'none';
            }
        };

        // --- 3.4 Rendering and DOM Manipulation (Crucial for Performance) ---

        /**
         * @function createTaskElement
         * WHY: To create the complete HTML structure for a single task efficiently.
         * WHAT FOR: Takes a task object and returns a fully constructed 'li' element.
         * * PERFORMANCE TIP: Creating and appending elements in memory (using document.createElement) 
         * is much faster than injecting large HTML strings (using innerHTML), especially in loops.
         * This avoids unnecessary parsing and repaints (performance killer!).
         */
        const createTaskElement = (task) => {
            // 1. Create the main list item element (<li>)
            const listItem = document.createElement('li');
            listItem.classList.add('task-item');
            // Check completion status and add the 'completed' class if necessary
            if (task.completed) {
                listItem.classList.add('completed');
            }
            // Store the task ID on the element itself for easy reference in event handlers
            listItem.dataset.taskId = task.id; 

            // 2. Create the text content element (<span>)
            const taskText = document.createElement('span');
            taskText.classList.add('task-text');
            taskText.textContent = task.text; // Set the task text
            
            // 3. Create the delete button (<button>)
            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.textContent = 'Delete';

            // --- Event Listeners for Interaction ---

            // A. Toggle Completion on Click (on the list item)
            // The item itself becomes a toggle button.
            listItem.addEventListener('click', (event) => {
                // Prevent the click on the list item from triggering if the delete button was clicked
                if (event.target === deleteBtn) {
                    return; 
                }
                toggleTaskCompletion(task.id);
            });

            // B. Delete Task on Click (on the delete button)
            deleteBtn.addEventListener('click', () => {
                deleteTask(task.id);
            });
            
            // 4. Assemble the element: Append the text and button to the list item
            listItem.appendChild(taskText);
            listItem.appendChild(deleteBtn);

            return listItem;
        };

        /**
         * @function renderTasks
         * WHY: To redraw the entire task list to reflect the current state of the 'tasks' array.
         * WHAT FOR: Clears the existing list and then re-renders all tasks from the array.
         * * PERFORMANCE TIP: Before adding new content, we clear the existing list 
         * using 'taskList.innerHTML = '';' which is an acceptable and clear way to empty a container.
         * We then append all new elements in one go.
         */
        const renderTasks = () => {
            // Clear the existing DOM elements to prepare for the fresh render
            taskList.innerHTML = ''; 

            // Iterate over the application's data array
            tasks.forEach(task => {
                const listItem = createTaskElement(task);
                // Append the created element to the list container in the DOM
                taskList.appendChild(listItem); 
            });

            // Always check and update the empty message visibility after rendering
            toggleEmptyMessage();
        };

        // --- 3.5 Core Application Logic ---

        /**
         * @function addTask
         * WHY: Handles the logic for creating a new task based on user input.
         */
        const addTask = () => {
            // Get the text from the input field and remove extra whitespace
            const text = taskInput.value.trim(); 

            // Input Validation: Check if the input is not empty
            if (text === '') {
                alert('Please enter a task description.'); // Use a non-modal message in a real app
                return; // Stop the function if input is invalid
            }

            // Create a new task object
            const newTask = {
                // Generate a unique ID (using current time + random number for simplicity)
                id: Date.now() + Math.random(), 
                text: text,
                completed: false
            };

            // Update the data (State Management)
            tasks.push(newTask); 
            
            // Re-render the UI (DOM Update)
            renderTasks(); 

            // Persist the changes
            saveTasks(); 

            // Clear the input field for the next task
            taskInput.value = '';
        };

        /**
         * @function toggleTaskCompletion
         * WHY: To mark a task as done or undone.
         * WHAT FOR: Finds the task in the 'tasks' array by its ID and flips its 'completed' status.
         */
        const toggleTaskCompletion = (taskId) => {
            // Use .map() to create a new array, updating only the matching task
            tasks = tasks.map(task => {
                if (task.id === taskId) {
                    // Spread operator (...) creates a copy of the task, then updates the 'completed' property
                    return { ...task, completed: !task.completed }; 
                }
                return task;
            });

            // Re-render the UI and save
            renderTasks();
            saveTasks();
        };
        
        /**
         * @function deleteTask
         * WHY: To permanently remove a task from the list.
         * WHAT FOR: Filters the 'tasks' array, keeping only tasks whose ID does NOT match the taskId.
         */
        const deleteTask = (taskId) => {
            // Use .filter() to create a new array that excludes the task with the matching ID
            tasks = tasks.filter(task => task.id !== taskId);

            // Re-render the UI and save
            renderTasks();
            saveTasks();
        };

        // --- 3.6 Event Handlers Initialization ---

        // 1. Add Task Button Click
        addTaskBtn.addEventListener('click', addTask);

        // 2. Add Task on 'Enter' Key Press in the input field
        // This provides a better user experience (UX).
        taskInput.addEventListener('keypress', (event) => {
            // Check if the key pressed is the 'Enter' key (key code 13 is also common)
            if (event.key === 'Enter') {
                addTask();
                // Prevent the default form submission behavior (though not necessary here as it's not a form)
                event.preventDefault(); 
            }
        });

        // --- 3.7 Initial Application Setup ---

        /**
         * @function initialize
         * WHY: Runs the necessary setup steps when the page first loads.
         */
        const initialize = () => {
            // 1. Load data from previous session
            loadTasks();
            // 2. Draw the loaded tasks to the screen
            renderTasks(); 
        };

        // Start the application setup!
        initialize();

    </script>
</body>
</html>
